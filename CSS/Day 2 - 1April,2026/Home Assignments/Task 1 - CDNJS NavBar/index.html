<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cdnjs Navbar</title>
  <style>
    /* Base styles to replicate the dark environment */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #222; /* Outer background to see the nav clearly */
    }

    /* Main Navigation Container */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #383838; /* The dark grey from the image */
      padding: 0 30px;
      height: 65px;
    }

    /* Left Section: Logo and Icons */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    /* Logo Styling */
    .logo {
      font-size: 26px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo .bracket { 
      color: #999; 
      font-weight: 400;
    }

    .logo .cdn { 
      color: #e65100; /* The distinct orange */
    } 

    .logo .js { 
      color: #ffffff; 
    }

    /* Social Icons Styling */
    .social-icons {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #d1d5db; /* Light grey */
    }

    .social-icons svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .social-icons svg:hover {
      color: #ffffff;
    }

    /* Right Section: Navigation Links */
    .nav-right {
      display: flex;
      align-items: center;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 28px;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      text-decoration: none;
      color: #f3f4f6; /* Off-white for unhovered links */
      font-size: 15px;
      transition: opacity 0.2s ease;
    }

    .nav-links li a:hover {
      opacity: 0.8;
    }

    /* Specific styling for the Status link and its green dot */
    .status-link {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: #2ecc71; /* Status green */
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <div class="logo">
        <span class="bracket">&lt;</span><span class="cdn">cdn</span><span class="js">js</span><span class="bracket">&gt;</span>
      </div>
      <div class="social-icons">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"></path></svg>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.67.41 3.25 1.15 4.65L2 22l5.35-1.15C8.75 21.59 10.33 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.48 0-2.89-.36-4.13-1l-3.32.72.72-3.32C4.36 14.89 4 13.48 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8zm-3-9h6v2H9v-2zm0-4h6v2H9V7z"></path></svg>
      </div>
    </div>
    
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a href="#">Libraries</a></li>
        <li><a href="#">API</a></li>
        <li><a href="#">GitHub</a></li>
        <li><a href="#" class="status-link">Status <span class="status-dot"></span></a></li>
      </ul>
    </div>
  </nav>

</body>
</html>
